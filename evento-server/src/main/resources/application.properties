spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
server.port=3000
evento.server.bus.enabled=true
evento.server.bus.port=3030
evento.server.bus.server-instance-id=${evento.cluster.node.server.id}
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
application.version=@version@
evento.cluster.name=evento-server
## MULTIPART (MultipartProperties)
# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Threshold after which files are written to disk.
spring.servlet.multipart.file-size-threshold=2KB
# Max file size.
spring.servlet.multipart.max-file-size=200MB
# Max Request Size
spring.servlet.multipart.max-request-size=215MB
## File Storage Properties
# All files uploaded through the REST API will be stored in this directory
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.data-source-properties.loginTimeout=30
spring.datasource.hikari.data-source-properties.connectTimeout=30
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.mvc.async.request-timeout=3000000
# Static GUI login (HTTP Basic). The user carries the WEB and ADMIN roles required by the
# controllers' @Secured annotations. Override both in any real deployment.
spring.security.user.name=${SPRING_SECURITY_USER_NAME:evento}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:secret}
spring.security.user.roles=WEB,ADMIN
spring.sql.init.mode=always
# Wire-level bundle auth: leave blank to accept all bundles (dev), or set a shared secret to require it.
evento.server.bus.auth-token=${EVENTO_SERVER_BUS_AUTH_TOKEN:}
evento.performance.capture.rate=1
evento.telemetry.ttl=365
evento.server.instance.id=server-0
logging.pattern.console=%clr(%d{YYYYMMddHHmmssSSS}){faint} %clr(%-5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%-40t]){cyan} %clr(%-40logger{0}){blue} %clr(:){red} %clr(%m){faint}%n


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/evento}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
evento.cluster.node.server.id=iris-evento-server
evento.bundle.autorun=false
evento.bundle.instances.min=1
evento.bundle.instances.max=1
server.address=0.0.0.0
#logging.level.com.evento=debug
logging.level.com.evento.server.bus.registry.ConnectionRegistry=trace
evento.es.mode=CPES

## Observability (Spring Boot Actuator + Micrometer/Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

