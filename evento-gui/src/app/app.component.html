<ion-app>
  <ion-tabs #tabs (ionTabsWillChange)="selectedTab = $event.tab">

    <ion-tab-bar id="main-header" slot="top">
      <app-wrapped-content>
       <div class="app-header">
        <img id="main-logo" src="assets/img/logo.png" routerLink="/" alt="Evento">

        <nav class="app-nav" aria-label="Primary">
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'payload-catalog'"
                  [attr.aria-current]="selectedTab === 'payload-catalog' ? 'page' : null"
                  (click)="tabs.select('payload-catalog')" translate="catalog.payload.title"></button>
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'component-catalog'"
                  [attr.aria-current]="selectedTab === 'component-catalog' ? 'page' : null"
                  (click)="tabs.select('component-catalog')" translate="catalog.component.title"></button>
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'bundle-list'"
                  [attr.aria-current]="selectedTab === 'bundle-list' ? 'page' : null"
                  (click)="tabs.select('bundle-list')" translate="bundle.title"></button>
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'cluster-status'"
                  [attr.aria-current]="selectedTab === 'cluster-status' ? 'page' : null"
                  (click)="tabs.select('cluster-status')" translate="cluster.title"></button>
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'application-flows'"
                  [attr.aria-current]="selectedTab === 'application-flows' ? 'page' : null"
                  (click)="tabs.select('application-flows')" translate="application.flows.title"></button>
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'application-graph'"
                  [attr.aria-current]="selectedTab === 'application-graph' ? 'page' : null"
                  (click)="tabs.select('application-graph')" translate="application.graph.title"></button>
          <button class="tab-button" type="button"
                  [class.selected]="selectedTab === 'system-state-store'"
                  [attr.aria-current]="selectedTab === 'system-state-store' ? 'page' : null"
                  (click)="tabs.select('system-state-store')" translate="system.state.store"></button>
        </nav>

        <button class="theme-toggle" type="button" (click)="theme.toggle()"
                [attr.aria-label]="(theme.isDark() ? 'theme.switch.light' : 'theme.switch.dark') | translate"
                [attr.aria-pressed]="theme.isDark()"
                [title]="(theme.isDark() ? 'theme.switch.light' : 'theme.switch.dark') | translate">
          <ion-icon aria-hidden="true" [name]="theme.isDark() ? 'sunny-outline' : 'moon-outline'"></ion-icon>
        </button>
       </div>
      </app-wrapped-content>
    </ion-tab-bar>

  </ion-tabs>
</ion-app>
