plugins {
    id 'java'
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

group 'com.eventoframework'
version "${eventoVersion}"
java {
    toolchain {
        languageVersion = javaLanguageVersion
    }
    withJavadocJar()
    withSourcesJar()
}

repositories {
    mavenCentral()
}

dependencies {
    api project(':evento-common')
    api "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    api "com.fasterxml.jackson.dataformat:jackson-dataformat-cbor:${jacksonVersion}"
    api 'org.slf4j:slf4j-api:2.0.16'

    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
    testImplementation "org.assertj:assertj-core:${assertjVersion}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.11.4'

    // Coverage-guided fuzzing of the CBOR wire codec (Jazzer @FuzzTest).
    testImplementation "com.code-intelligence:jazzer-junit:${jazzerVersion}"
}

// The Jazzer fuzz harness lives in src/fuzz/java (not src/test/java) so OpenSSF
// Scorecard's fuzzing check can see it — Scorecard skips every /src/test/ path
// as test data, which would otherwise hide the com.code_intelligence.jazzer
// import. It is still part of the test source set, so `:test` compiles and runs
// it (regression mode) and JAZZER_FUZZ=1 fuzzes it.
sourceSets {
    test {
        java {
            srcDir 'src/fuzz/java'
        }
    }
}

test {
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = group
            artifactId = 'evento-transport-api'
            version = version
            from components.java
            pom {
                name = "Evento Framework - Transport API"
                description = "Transport SPI for the Evento Framework: sealed Message hierarchy, Codec, Transport, ConnectionState, ReconnectStrategy, HandshakeProtocol"
                url = "https://www.eventoframework.com/"
                licenses {
                    license {
                        name = "Dual License: AGPL-3.0 or Commercial"
                        url = "https://www.eventoframework.com/licensing"
                    }
                }
                developers {
                    developer {
                        id = "gaborgalazzo"
                        name = "Gabor Galazzo"
                        email = "gabor.galazzo@gmail.com"
                    }
                }
                scm {
                    connection = "scm:git:git://github.com/EventoFramework/evento-framework.git"
                    developerConnection = "scm:git:ssh://github.com/EventoFramework/evento-framework.git"
                    url = "https://github.com/EventoFramework/evento-framework/tree/main/evento-transport-api"
                }
            }
            repositories {
                maven {
                    name = 'ossrh-staging-api'
                    url = "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/"
                    credentials {
                        username = project.findProperty("mavenCentralUsername") ?: System.getenv("MAVEN_CENTRAL_USERNAME")
                        password = project.findProperty("mavenCentralPassword") ?: System.getenv("MAVEN_CENTRAL_PASSWORD")
                    }
                }
                maven {
                    name = 'GitHubPackages'
                    url = "https://maven.pkg.github.com/EventoFramework/evento-framework"
                    credentials {
                        username = project.findProperty("gpr.user") ?: System.getenv("GITHUB_ACTOR")
                        password = project.findProperty("gpr.key") ?: System.getenv("GITHUB_TOKEN")
                    }
                }
            }
        }
    }
}

signing {
    required = false
    def signingKey = System.getenv("SIGNING_KEY")
    if (signingKey) {
        useInMemoryPgpKeys(signingKey, System.getenv("SIGNING_PASSWORD"))
    }
    sign publishing.publications.mavenJava
}

javadoc {
    if (JavaVersion.current().isJava9Compatible()) {
        options.addBooleanOption("html5", true)
        options.addStringOption('Xdoclint:none', '-quiet')
    }
}
