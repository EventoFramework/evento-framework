version: '3.3'
services:
  database:
    image: 'postgres:latest'
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=evento
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/
    ports:
      - "5433:5432"
  evento-server:
    image: 'eventoframework/evento-server:latest'
    depends_on:
      - database
    environment:
      - evento_cluster_name=evento-server
      - evento_performance_capture_rate=0.1
      - evento_telemetry_ttl=365
      # GUI/API login (HTTP Basic) — override in real deployments
      - spring_security_user_name=evento
      - spring_security_user_password=secret
      - spring_datasource_url=jdbc:postgresql://database:5432/evento
      - spring_datasource_username=postgres
      - spring_datasource_password=secret
    ports:
      - '3000:3000'
      - '3030:3030'


