plugins {
    id 'java'
    id 'io.spring.dependency-management' version '1.1.7'
}
group 'com.evento'
version "${eventoVersion}"
java { toolchain { languageVersion = javaLanguageVersion } }
dependencyManagement {
    imports { mavenBom 'org.springframework.boot:spring-boot-dependencies:4.1.0' }
}
repositories { mavenCentral(); mavenLocal() }
dependencies {
    testImplementation project(':evento-lab-microservices:evento-lab-ms-api')
    testImplementation project(':evento-lab-microservices:evento-lab-ms-command')
    testImplementation project(':evento-lab-microservices:evento-lab-ms-query')
    testImplementation project(':evento-lab-microservices:evento-lab-ms-saga')
    testImplementation project(':evento-lab-microservices:evento-lab-ms-observer')
    testImplementation project(':evento-server')
    testImplementation project(':evento-consumer-state-store:evento-consumer-state-store-jdbc')
    testImplementation "org.junit.jupiter:junit-jupiter:${junitVersion}"
    testRuntimeOnly  "org.junit.platform:junit-platform-launcher"
    testImplementation "org.assertj:assertj-core:${assertjVersion}"
    testImplementation 'org.awaitility:awaitility:4.3.0'
    testImplementation "org.testcontainers:testcontainers:${testcontainersVersion}"
    testImplementation "org.testcontainers:postgresql:${testcontainersVersion}"
    testImplementation "org.testcontainers:junit-jupiter:${testcontainersVersion}"
    testRuntimeOnly "org.postgresql:postgresql:${postgresJdbcVersion}"
    testImplementation "com.zaxxer:HikariCP:${hikariVersion}"
    testRuntimeOnly "org.flywaydb:flyway-core:${flywayVersion}"
    testRuntimeOnly "org.flywaydb:flyway-database-postgresql:${flywayVersion}"
    testImplementation 'org.apache.logging.log4j:log4j-slf4j2-impl:2.26.1'
    compileOnly "org.projectlombok:lombok:${lombokVersion}"
    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    testCompileOnly "org.projectlombok:lombok:${lombokVersion}"
    testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"
}
configurations.testRuntimeClasspath {
    exclude group: 'org.apache.logging.log4j', module: 'log4j-to-slf4j'
}
test {
    useJUnitPlatform()
    def dockerHost = System.getenv("DOCKER_HOST") ?: "unix:///var/run/docker.sock"
    environment "DOCKER_HOST", dockerHost
    environment "TESTCONTAINERS_RYUK_DISABLED", "true"
    // docker-java reads the target API version ONLY from the `api.version` system
    // property — a DOCKER_API_VERSION env var is ignored, leaving the broken 1.32
    // default. 1.40 is Docker Desktop 29.x's minimum and within range of the older
    // engine on GitHub-hosted runners, so it works in both. Override with -Dapi.version.
    systemProperty "api.version", System.getProperty("api.version") ?: "1.40"
}
