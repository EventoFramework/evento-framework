name: CLI Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        uses: dolittle/read-version-from-file-action@v2
        with:
          path: evento-server/version.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: corretto
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build CLI JAR
        run: ./gradlew --no-daemon :evento-cli:clean :evento-cli:shadowJar

      - name: Stage artifacts
        run: mkdir staging && cp evento-cli/build/libs/*.jar staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: evento-cli
          path: staging
          retention-days: 7

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.current-version }}
          name: Evento CLI ${{ steps.version.outputs.current-version }}
          prerelease: true
          files: staging/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
