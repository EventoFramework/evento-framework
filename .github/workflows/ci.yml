name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: corretto
          java-version: '25'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run core tests
        run: |
          ./gradlew --no-daemon \
            :evento-transport-api:test \
            :evento-transport-netty:test \
            :evento-server:test \
            :evento-common:test \
            :evento-bundle:test \
            :evento-lab:test \
            :evento-lab-microservices:evento-lab-ms-it:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  jdbc-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: corretto
          java-version: '25'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      # GitHub-hosted ubuntu runners ship Docker, so the Testcontainers-gated JDBC
      # ITs (Postgres + MySQL, incl. PgDistributedLockIT) run here — unlike a local
      # Docker Desktop, which can hit a Testcontainers/Docker API mismatch.
      - name: Run JDBC integration tests (Testcontainers)
        env:
          EVENTO_RUN_JDBC_IT: "true"
        run: |
          ./gradlew --no-daemon \
            :evento-consumer-state-store:evento-consumer-state-store-jdbc:test

      - name: Upload JDBC IT reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jdbc-it-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  gui-build:
    # The evento-gui frontend is embedded in the boot jar by release.yml but was
    # never exercised in PR CI, so frontend dependency bumps (e.g. Angular majors)
    # could merge green while breaking the production build. Run the same steps
    # release.yml does — resolve deps and `ionic build --prod` — plus lint.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: evento-gui/package-lock.json

      - name: Install Ionic CLI
        run: npm install -g @ionic/cli@7.2.1

      # Mirror release.yml: `npm install` (not `npm ci`) because the committed
      # package-lock.json was authored on macOS/arm64 + npm 11 and omits
      # Linux-x64 optional peer deps, so `npm ci` refuses on the Linux runner.
      - name: Install GUI dependencies
        run: npm install --no-audit --no-fund
        working-directory: ./evento-gui

      - name: Lint
        run: npx ng lint
        working-directory: ./evento-gui

      - name: Build (production)
        run: ionic build --prod
        working-directory: ./evento-gui
