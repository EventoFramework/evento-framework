name: Docker Build & Push — Server

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: read

jobs:
  build-and-push-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        uses: dolittle/read-version-from-file-action@v2
        with:
          path: evento-server/version.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: evento-gui/package-lock.json

      - name: Install Ionic CLI
        run: npm install -g @ionic/cli

      - name: Install GUI dependencies
        run: npm install
        working-directory: ./evento-gui

      - name: Build Ionic app
        run: ionic build --prod
        working-directory: ./evento-gui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/images/evento-server/Dockerfile
          push: true
          tags: |
            eventoframework/evento-server:latest
            eventoframework/evento-server:${{ steps.version.outputs.current-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        uses: dolittle/read-version-from-file-action@v2
        with:
          path: evento-server/version.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: evento-gui/package-lock.json

      - name: Install Ionic CLI
        run: npm install -g @ionic/cli

      - name: Install GUI dependencies
        run: npm install
        working-directory: ./evento-gui

      - name: Build Ionic app
        run: ionic build --prod
        working-directory: ./evento-gui

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push macOS image
        run: |
          docker build . \
            --file docker/images/evento-server/Dockerfile-macOS \
            --tag eventoframework/evento-server:latest-macos \
            --tag eventoframework/evento-server:${{ steps.version.outputs.current-version }}-macos
          docker push --all-tags eventoframework/evento-server
